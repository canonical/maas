name: Bump MAAS Version

on:
  workflow_dispatch:
    inputs:
      maas_version:
        description: 'MAAS version to bump'
        required: true
      ubuntu_distro:
        description: 'Ubuntu distro codename associated with this MAAS version'
        type: choice
        options:
        - focal
        - jammy
        - noble
        - resolute
        required: true
      full_name:
        description: 'Full name of the releaser (used for debian changelog)'
        type: string
        required: true
      email:
        description: 'Email of the releaser (used for debian changelog)'
        type: string
        required: true


env:
  DEBFULLNAME: ${{ github.event.inputs.full_name }}
  DEBEMAIL: ${{ github.event.inputs.email }}

permissions:
  contents: write


jobs:
  bump-version:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.LANDER_GH_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y devscripts

      - name: Bump Version and Push
        run: |
          git config user.name ${{ vars.LANDER_USERNAME }}
          git config user.email ${{ vars.LANDER_EMAIL }}
          ./utilities/version-bump.sh ${{ github.event.inputs.maas_version}} ${{ github.event.inputs.ubuntu_distro }}
          git push origin HEAD:${GITHUB_REF_NAME} --tags
