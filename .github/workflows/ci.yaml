name: CI check

on:
  # Run on default events, and also when converted from draft to ready
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

jobs:
  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - 'utilities/**'
              - 'pyproject.toml'
              - 'tox.ini'
              - 'setup.py'
              - 'openapi.yaml'
              - 'Makefile'
            go:
              - 'src/**/*.go'
              - 'src/**/go.mod'
              - 'src/**/go.sum'
              - 'src/**/Makefile'
              - 'Makefile'

  lint-and-test:
    needs: changes
    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'master' || github.base_ref }}
      env:
        GOPATH: /home/ubuntu/go
        GOCACHE: /home/ubuntu/.cache/go-build
      volumes:
        - /github/home/go:/home/ubuntu/go
        - /github/home/.cache/go-build:/home/ubuntu/.cache/go-build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Go modules cache
        uses: actions/cache@v5
        with:
          path: |
            /github/home/.cache/go-build
            /github/home/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('src/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go

      - name: Prepare container
        if: ${{ needs.changes.outputs.python == 'true' || needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
        run: |
          chown -R ubuntu:ubuntu /home/ubuntu
          chown -R ubuntu:ubuntu $(pwd)
          git config --global --add safe.directory $(pwd)
          make install-dependencies
          su ubuntu -c "make build"

      - name: Lint Python
        if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'merge_group' }}
        run: |
          su ubuntu -c "make lint-py-builders lint-py check-types lint-py-imports lint-py-linefeeds lint-oapi lint-shell"

      - name: Test Python
        if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'merge_group' }}
        run: |
          su ubuntu -c "make test-py"

      - name: Lint Go
        if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
        run: |
          su ubuntu -c "make lint-go"

      - name: Test Go
        if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
        run: |
          su ubuntu -c "make test-go"

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ${{ github.workspace }}/junit*.xml
