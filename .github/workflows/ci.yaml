name: CI check

on:
  # Run on default events, and also when converted from draft to ready
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'master' || github.base_ref }}

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}

    container:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      volumes:
        - $HOME/go/pkg/mod:/home/ubuntu/go/pkg/mod
        - $HOME/.cache/go-build:/home/ubuntu/.cache/go-build
        - ${{ github.workspace }}:/work
      options: --workdir /work
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # containers default to sh, make bash as the default
    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Go modules cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('src/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go

      - name: Prepare container
        run: |
          git config --global --add safe.directory /work
          useradd ubuntu || true
          chown -R ubuntu:ubuntu /home/ubuntu
          chown -R ubuntu:ubuntu /work
          sudo -H -u ubuntu make install-dependencies
          sudo -H -u ubuntu make build

      - name: Lint
        run: sudo -H -u ubuntu make lint

      - name: Test
        run: sudo -H -u ubuntu make test

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            /work/junit*.xml
