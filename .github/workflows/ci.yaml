name: CI check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read

jobs:
  save-pr-number:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Save PR number to artifact
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt
      - name: Upload PR number artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr-number.txt

  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}

    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      lint: ${{ steps.filter.outputs.lint }}
      image: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set build env image tag
        id: image
        run: |
          ref="${{ github.event.merge_group.base_ref || github.base_ref || github.ref_name }}"
          echo "tag=${ref#refs/heads/}" >> $GITHUB_OUTPUT

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'src/**/*.py'
              - 'pyproject.toml'
              - 'tox.ini'
              - 'setup.py'
              - 'openapi.yaml'
              - 'Makefile'
              - 'utilities/**'
              - 'src/**/*.go'
              - 'src/**/go.mod'
              - 'src/**/go.sum'
              - 'src/**/Makefile'
              - 'snap/local/tree/usr/bin/*'
            python:
              - 'src/**/*.py'
              - 'utilities/generate_builders.py'
              - 'utilities/run-py-tests-ci'
              - 'pyproject.toml'
              - 'tox.ini'
            go:
              - 'src/**/*.go'
              - 'src/**/go.mod'
              - 'src/**/go.sum'
            docs:
              - 'docs/**'
              - 'src/**/*.py'
              - 'utilities/run-py-tests-ci'
              - 'pyproject.toml'
              - 'tox.ini'
              - 'required-packages/base'
              - 'snap/snapcraft.yaml'

  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.lint == 'true' }}
    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ needs.changes.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Run lint
        run: |
          su ubuntu -c "make lint"

  validate-conventional-commit:
    if: ${{ github.event_name == 'pull_request' }}
    name: Validate Conventional Commit standard
    runs-on: ubuntu-slim
    steps:
      - name: Check PR title for Conventional Commits format
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            chore
            docs
          scopes: |
            fe-base
            fe-images
            fe-accounts
            fe-sites
            fe-settings
            fe-tokens
            be-config
            be-settings
            be-sites
            be-tokens
            be-accounts
            be-db
            be-images
            docs
            ci
            structural
            content
            linting
            links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify BREAKING CHANGE in description
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Safely read the multiline PR body from the environment variable
          PR_BODY="$PR_BODY_ENV"

          # Extract everything before the first colon in the title
          # e.g., "feat(ui)!: rewrite" becomes "feat(ui)!"
          PREFIX="${PR_TITLE%%:*}"

          # If the prefix contains an exclamation mark, it's a breaking change
          if [[ "$PREFIX" == *"!"* ]]; then
            echo "⚠️ Breaking change indicator ('!') detected in PR title."

            # Check if the body contains the required text
            if [[ "$PR_BODY" != *"BREAKING CHANGE:"* ]]; then
              echo "❌ Error: PR title indicates a breaking change, but 'BREAKING CHANGE:' is missing from the PR description."
              exit 1
            fi

            echo "✅ 'BREAKING CHANGE:' found in the description."
          else
            echo "ℹ️ No breaking change indicator in title. Skipping description check."
          fi
        env:
          # We pass the body as an env var to prevent bash syntax errors
          # that occur when injecting multiline strings directly via ${{ }}
          PR_BODY_ENV: ${{ github.event.pull_request.body }}

  test-python:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.python == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ needs.changes.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          CACHE_DIR=/home/ubuntu/.cache/pip
          su ubuntu -c "PIP_CACHE_DIR=$CACHE_DIR make test-py"

  test-go:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.go == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ needs.changes.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          su ubuntu -c "make test-go"
  test-docs:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.docs == 'true' }}
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        fetch-depth: 0
    - name: Create venv
      working-directory: "docs"
      run: make install
    - name: Lint markdown
      working-directory: "docs"
      run: make lint-md
    - name: Test build
      working-directory: "docs"
      run: make html
    - name: Run scripts tests
      working-directory: "docs"
      run: |
        source .sphinx/venv/bin/activate
        pip install -r requirements-dev.txt
        cd _scripts && python -m pytest .

  ci-check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test-python, test-go, test-docs, validate-conventional-commit]
    steps:
      - name: Determine overall CI status
        id: status
        run: |
          # If any dependency failed or was cancelled, mark as failure
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "state=failure" >> $GITHUB_OUTPUT
          else
            echo "state=success" >> $GITHUB_OUTPUT
          fi

      - name: Fail pipeline if dependencies failed
        if: steps.status.outputs.state == 'failure'
        run: exit 1
