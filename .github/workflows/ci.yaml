name: CI check

on:
  # Run on default events, and also when converted from draft to ready
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

jobs:
  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - 'pyproject.toml'
              - 'tox.ini'
              - 'setup.py'
              - 'openapi.yaml'
              - 'Makefile'
            go:
              - 'src/**/*.go'
              - 'src/**/go.mod'
              - 'src/**/go.sum'
              - 'src/**/Makefile'
              - 'Makefile'

  lint-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' || needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'master' || github.base_ref }}
      options: --user ubuntu
      env:
        GOPATH: /github/home/go
        GOCACHE: /github/home/.cache/go-build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Go modules cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('src/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go

      - name: Prepare container
        run: |
          git config --global --add safe.directory $(pwd)
          make install-dependencies
          make build

      - name: Lint Python
        if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'merge_group' }}
        run: make lint-py-builders lint-py check-types lint-py-imports lint-py-linefeeds lint-oapi lint-shell

      - name: Test Python
        if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'merge_group' }}
        run: make test-py

      - name: Lint Go
        if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
        run: make lint-go

      - name: Test Go
        if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'merge_group' }}
        run: make test-go

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            /work/junit*.xml

  ci-result:
    if: ${{ always() && !github.event.pull_request.draft }}
    needs: [lint-and-test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify all checks passed
        run: |
          result="${{ needs.lint-and-test.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            echo "CI check failed or was cancelled"
            exit 1
          fi
          echo "All checks passed or were skipped"
