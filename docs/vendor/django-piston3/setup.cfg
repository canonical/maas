[tox]
requires =
    tox>=4.2

[metadata]
name = django-piston3
version = 0.5.2
description = Piston is a Django mini-framework creating APIs
url = https://launchpad.net/django-piston3
license = BSD
long_description = file: README.md
author = Jesper Noehr
author_email = jesper@noehr.org
maintainer = MAAS developers
maintainer_email = maas-devel@lists.ubuntu.com

[options]
zip_safe = false
include_package_data = true
packages = find:
python_requires = >= 3.10
install_requires =
    Django >=3.2, <5
    python-mimeparse
    PyYAML
