[tox]
requires =
    tox>=4.2
env_list =
    py3-django{42, 32}

[testenv]
deps =
    django32: Django<3.3,>=3.2
    django42: Django<4.3,>=4.2
extras =
    testing
commands =
    pytest -vs {posargs}

[testenv:format]
deps =
    pyproject-fmt==2.1.3
    ruff==0.5
    tox-ini-fmt==1.3.1
commands =
    - pyproject-fmt pyproject.toml
    - tox-ini-fmt tox.ini setup.cfg
    ruff format {[globals]lint_files}
    ruff check --fix {[globals]lint_files}

[testenv:lint]
deps =
    pyproject-fmt==2.1.3
    ruff==0.5
commands =
    ruff check {[globals]lint_files}
    pyproject-fmt --check pyproject.toml

[globals]
lint_files =
    piston3/ \
    examples/ \
    tests/
