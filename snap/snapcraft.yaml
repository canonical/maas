name: maas
adopt-info: maas
summary: Metal as a Service
description: |
  Total automation of your physical servers for amazing data center operational efficiency.
grade: devel
confinement: strict
base: core26
build-base: devel
assumes:
  - snapd2.75
system-usernames:
  snap_daemon: shared
# epochs:
# 0: (2.5) PostgreSQL 9.5
# 1: (2.6) PostgreSQL 10
# 2: (2.8) move MAAS data to $SNAP_COMMON
# 3: (2.9) drop "all" mode and builtin PostgresSQL server
# 4: (3.5) supervisord -> Pebble migration
epoch: 4*

package-repositories:
  - type: apt
    ppa: maas-committers/latest-deps

environment:
  PYTHONPATH: $SNAP/usr/lib/python3/dist-packages
  LD_PRELOAD: $SNAP/usr/lib/snap-preload.so
  PEBBLE: $SNAP_COMMON/pebble

plugs:
  test-db-socket:
    interface: content
    content: db-socket
    target: $SNAP_COMMON/test-db-socket

slots:
  maas-logs:
    interface: content
    read:
      - $SNAP_COMMON/log

apps:
  pebble:
    daemon: simple
    command: usr/bin/run-pebble-daemon
    plugs:
      - avahi-observe
      - hardware-observe
      - kernel-module-observe
      - mount-observe
      - network
      - network-bind
      - network-control
      - network-observe
      - snap-refresh-control
      - system-observe
      - system-trace # allows for the running of eBPF programs
      - time-control

  maas:
    command: usr/bin/maas
    plugs:
      - block-devices  # allow blkid (machine-resources) to read disk devices
      - hardware-observe  # allow machine-resources to read hardware info from /sys
      - home
      - mount-observe  # to read /proc/*/mounts
      - network # for external authentication
      - network-observe # to get default URL

  power:
    command: usr/bin/maas-power
    environment:
      MAAS_PATH: $SNAP
    plugs:
      - network

parts:
  maas-slices:
    plugin: nil
    stage-packages:
      - bind9_core
      - bind9_standard
      - bind9_config
      - bind9_data
      - bind9-dnsutils_bins
      - dns-root-data_data
      - gpgv_bins
      - iproute2_ip-bin
      - libpq5_libs
      - libxtables12_libs
      - openssh-client_bins
      - perl-base_bins
      - perl-base_modules
      - ubuntu-keyring_keys
      - wget_bins
    stage:
      - etc/bind
      - usr/bin
      - -usr/bin/python3*
      - usr/lib
      - -usr/lib/systemd
      - -usr/lib/tmpfiles.d
      - usr/sbin
      - usr/share/dns
      - usr/share/keyrings
      - var/cache/bind
      - var/lib/bind

  pebble:
    plugin: go
    build-packages:
      - golang-go
    source-type: git
    source: https://github.com/canonical/pebble
    source-tag: v1.10.2
    organize:
      bin: usr/sbin

  maas:
    plugin: python
    source: .
    build-packages:
      - build-essential
      - cargo
      - git
      - libffi-dev
      - libpq-dev
      - libssl-dev
      - libxml2-dev
      - libxslt1-dev
      - python3-setuptools
      - python3-wheel
    stage-packages:
      - amtterm # AMT power driver
      - avahi-utils
      - chrony
      - freeipmi-tools # IPMI power driver
      - ipmitool # Moonshot power driver
      - isc-dhcp-client
      - isc-dhcp-server
      - libatm1
      - libsoap-lite-perl # AMT power driver
      - libvirt-clients # Virsh pod driver
      - libxml-parser-lite-perl # AMT power driver
      - libxml-parser-perl # AMT power driver
      - lshw
      - nginx-core
      - nmap
      - python3
      - python3-aiodns # optional async DNS resolver for aiohttp
      - python3-aiofiles
      - python3-aiohttp
      - python3-alembic
      - python3-asyncpg
      - python3-attr
      - python3-authlib
      - python3-babel # transitive dep of python3-seamicroclient
      - python3-bson
      - python3-cffi-backend # C extension required at runtime by nacl and cryptography
      - python3-crochet
      - python3-cryptography
      - python3-curtin
      - python3-dateutil
      - python3-distro-info
      - python3-django
      - python3-django-piston3
      - python3-fastapi
      - python3-formencode
      - python3-httplib2
      - python3-httpx
      - python3-hvac
      - python3-joserfc
      - python3-jsonschema
      - python3-lxml
      - python3-macaroonbakery
      - python3-markupsafe
      - python3-mimeparse # transitive dep of python3-django-piston3
      - python3-python-multipart # required by FastAPI for Form/UploadFile
      - python3-netaddr
      - python3-netifaces
      - python3-oauthlib
      - python3-packaging
      - python3-paramiko
      - python3-passlib
      - python3-petname
      - python3-pexpect # Virsh pod driver
      - python3-pkg-resources # transitive dep of python3-seamicroclient (hard import)
      - python3-platformdirs # transitive dep of python3-pkg-resources
      - python3-prometheus-client
      - python3-psycopg2
      - python3-pydantic
      - python3-pylxd
      - python3-pyparsing # transitive dep of python3-httplib2
      - python3-pythonjsonlogger
      - python3-pyvmomi # VMware power driver
      - python3-referencing # transitive dep of python3-jsonschema
      - python3-requests
      - python3-requests-toolbelt # transitive dep of python3-pylxd
      - python3-requests-unixsocket
      - python3-seamicroclient # SeaMicro power driver
      - python3-sqlalchemy
      - python3-starlette
      - python3-structlog
      - python3-tempita
      - python3-temporalio
      - python3-twisted
      - python3-txtftp
      - python3-tz
      - python3-ulid
      - python3-uvicorn
      - python3-uvloop
      - python3-yaml
      - python3-zhmcclient # IBM Z HMC power driver
      - python3-zope.interface
      - rsyslog
      - snmp # APC power driver
      - squid
      - tcpdump
      - temporal
      - wsmancli # AMT power driver
    build-attributes:
      - enable-usrmerge
    organize:
      lib/python3.*/site-packages/etc/*: etc/
      lib/python3.*/site-packages/usr/bin/*: usr/bin/
      lib/python3.*/site-packages/usr/lib/*: usr/lib/
      lib/python3.*/site-packages/usr/sbin/*: usr/sbin/
      lib/python3.*/site-packages/usr/share/*: usr/share/
      usr/lib/curtin/helpers: usr/lib/python3/dist-packages/helpers/
      usr/lib/*-linux-gnu/blas/*: usr/lib/
      usr/local/bin/*: usr/bin/
      usr/local/lib/python3.14/*: usr/lib/python3.14/
    stage:
      - etc/chrony
      - etc/freeipmi
      - etc/libvirt
      - etc/maas
      - etc/nginx
      - etc/openwsman
      - -lib/python3.*/site-packages/etc
      - -lib/python3.*/site-packages/usr
      - -lib/python3/dist-packages/maastesting
      - usr/bin
      - usr/bin/python3*
      - -usr/bin/xdg-*
      - -usr/bin/maas-sampledata
      - usr/lib
      - -usr/lib/python3.14/test
      - -usr/lib/systemd
      - -usr/lib/udev
      - -usr/lib/tmpfiles.d
      - -usr/lib/sysctl.d
      - -usr/lib/sysusers.d
      - -usr/lib/binfmt.d
      - -usr/lib/x86_64-linux-gnu/gconv
      - -usr/lib/python3/dist-packages/setuptools
      - -usr/lib/python3/dist-packages/setuptools-*.dist-info
      - -usr/lib/python3/dist-packages/*-stubs
      - -usr/lib/python3/dist-packages/*_stubs
      - -usr/lib/python3/dist-packages/pygments
      - -usr/lib/python3/dist-packages/pygments-*.dist-info
      - usr/sbin
      - usr/share/ieee-data
      - usr/share/maas
      - usr/share/nginx
      - usr/share/squid*
      - var/lib/ieee-data
      - var/lib/temporal
    override-build: |
      # Install MAAS package directly without venv to avoid symlink conflicts
      # with staged packages on systems where /bin is a symlink to /usr/bin
      /usr/bin/python3 -m pip install --prefix=$CRAFT_PART_INSTALL/usr --no-build-isolation --root-user-action=ignore .
      find $CRAFT_PART_INSTALL -type f -executable -exec sed -i '1 s|^#\!.*python3.*$|#!/usr/bin/env python3|' {} +

      cp -a package-files/* $CRAFT_PART_INSTALL
      # If python3-netaddr contains absolute symlinks.
      # See https://bugs.launchpad.net/snapcraft/+bug/1774410
      ln -sf ../../../../../../var/lib/ieee-data/oui.txt $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/oui.txt
      ln -sf ../../../../../../var/lib/ieee-data/iab.txt $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/iab.txt
    override-prime: |
      (cd $CRAFT_PART_SRC; craftctl set version="$(utilities/package-version)")
      craftctl default
      python3 -m compileall -j 0 -q .

  ui:
    plugin: make
    source: .
    build-packages:
      - curl
    override-build: |
      cd src/maasui
      make
      INSTALL_DIR="$CRAFT_PART_INSTALL/usr/share/maas/web"
      mkdir -p "$INSTALL_DIR"
      cp -a build "$INSTALL_DIR/static"
    prime:
      - usr/share/maas/web/static

  offline-docs:
    plugin: make
    source: .
    build-packages:
      - python3-venv
      - python3-pip
      - libcairo2
      - python3-dev    # netifaces requirement
      - git            # for git+https://git.launchpad.net/django-piston3 in requirements.txt
    override-build: |
      cd $CRAFT_PART_SRC/docs
      MAAS_OFFLINE_DOCS=true make html
      INSTALL_DIR="$CRAFT_PART_INSTALL/usr/share/maas/web/static/docs"
      mkdir -p "$INSTALL_DIR"
      cp -a _build/* "$INSTALL_DIR/"
    prime:
      - usr/share/maas/web/static/docs

  host-info:
    plugin: make
    source: src/host-info
    build-packages:
      - golang-go
    prime:
      - usr/share/maas/machine-resources

  maas-agent:
    plugin: make
    source: src/maasagent
    build-packages:
      - golang-go
    build-environment:
      - GOFLAGS: "${GOFLAGS:-} -mod=readonly"
    prime:
      - usr/sbin/

  maas-openfga:
    plugin: make
    source: src/maasopenfga
    build-packages:
      - golang-go
    build-environment:
      - GOFLAGS: "${GOFLAGS:-} -mod=readonly"
    prime:
      - usr/sbin/

  tree:
    plugin: dump
    source: snap/local/tree

  snap-preload:
    plugin: make
    source: https://github.com/canonical/snap-preload
    source-type: git

hooks:
  install:
    plugs:
      - mount-observe  # to read /proc/*/mounts
      - network  # to connect to the db for running upgrades
  post-refresh:
    plugs:
      - mount-observe  # to read /proc/*/mounts
      - network  # to connect to the db for running upgrades

layout:
  /etc/libvirt:
    bind: $SNAP/etc/libvirt
  /usr/sbin/ipmi-config:
    bind-file: $SNAP/usr/sbin/ipmi-config
  /etc/freeipmi:
    bind: $SNAP/etc/freeipmi
  /root:
    bind: $SNAP_DATA/root
  # Needed for nginx to enable SSL passthrough
  /usr/lib/nginx/modules:
     bind: $SNAP/usr/lib/nginx/modules
  /usr/bin/perl:
     bind-file: $SNAP/usr/bin/perl
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl:
     bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl5:
     bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl5
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl-base:
     bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl-base
  /usr/share/perl:
     bind: $SNAP/usr/share/perl
  /usr/share/perl5:
     bind: $SNAP/usr/share/perl5
