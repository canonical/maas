name: maas-power-driver-openbmc
version: '1.0.0'
summary: MAAS power driver for OpenBMC
description: MAAS power driver for OpenBMC BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  openbmc-driver:
    plugin: python
    source: .
