name: maas-power-driver-amt
version: '1.0.0'
summary: MAAS power driver for Intel AMT
description: MAAS power driver for Intel AMT BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  amt-driver:
    plugin: python
    source: .
    stage-packages:
      - amtterm
      - wsmancli
    build-attributes:
      - enable-usrmerge
    override-build: |
      /usr/bin/python3 -m pip install --prefix=$CRAFT_PART_INSTALL/usr --no-build-isolation --root-user-action=ignore .
      find $CRAFT_PART_INSTALL -type f -executable -exec sed -i '1 s|^#!.*python3.*$|#!/usr/bin/env python3|' {} +

  tree:
    plugin: dump
    source: snap/local/tree
