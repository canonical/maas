name: maas-power-driver-apc
version: '1.0.0'
summary: MAAS power driver for APC
description: MAAS power driver for APC BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver
  network-bind:

apps:
  apc:
    command: bin/apc-driver start
    sockets:
      apc:
        listen-stream: $SNAP_COMMON/power-driver/apc.sock
  status:
    command: bin/apc-driver status

parts:
  apc-driver:
    plugin: python
    source: .
    stage-packages:
      - snmp
    build-attributes:
      - enable-usrmerge
    override-build: |
      /usr/bin/python3 -m pip install --prefix=$CRAFT_PART_INSTALL/usr --no-build-isolation --root-user-action=ignore .
      find $CRAFT_PART_INSTALL -type f -executable -exec sed -i '1 s|^#!.*python3.*$|#!/usr/bin/env python3|' {} +
