name: maas-power-driver-apc
version: '1.0.0'
summary: MAAS power driver for APC
description: MAAS power driver for APC BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  apc-driver:
    plugin: python
    source: .
    stage-packages:
      - snmp
