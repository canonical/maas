name: maas-power-driver-hmcz
version: '1.0.0'
summary: MAAS power driver for IBM HMCz
description: MAAS power driver for IBM HMCz BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  hmcz-driver:
    plugin: python
    source: .
