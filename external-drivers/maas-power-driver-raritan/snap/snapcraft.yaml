name: maas-power-driver-raritan
version: '1.0.0'
summary: MAAS power driver for Raritan
description: MAAS power driver for Raritan BMCs
grade: devel
confinement: strict
base: core26

plugs:
  power-driver:
    interface: content
    content: power-driver

parts:
  raritan-driver:
    plugin: python
    source: .
services:
  raritan-driver:
    command: bin/raritan-driver start
    plugs:
      - network
    sockets:
      raritan:
        listen-stream: $SNAP_COMMON/power-driver/raritan.sock
