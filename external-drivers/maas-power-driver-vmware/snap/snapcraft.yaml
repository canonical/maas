name: maas-power-driver-vmware
version: '1.0.0'
summary: MAAS power driver for VMware
description: MAAS power driver for VMware BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  vmware-driver:
    plugin: python
    source: .
