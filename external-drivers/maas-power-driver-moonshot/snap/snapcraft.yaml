name: maas-power-driver-moonshot
version: '1.0.0'
summary: MAAS power driver for HP Moonshot
description: MAAS power driver for HP Moonshot BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  moonshot-driver:
    plugin: python
    source: .
    stage-packages:
      - ipmitool
