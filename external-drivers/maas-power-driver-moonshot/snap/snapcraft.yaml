name: maas-power-driver-moonshot
version: '1.0.0'
summary: MAAS power driver for HP Moonshot
description: MAAS power driver for HP Moonshot BMCs
grade: devel
confinement: strict
base: core26

plugs:
  power-driver:
    interface: content
    content: power-driver

parts:
  moonshot-driver:
    plugin: python
    source: .
    stage-packages:
      - ipmitool
services:
  moonshot-driver:
    command: bin/moonshot-driver start
    plugs:
      - network
    sockets:
      moonshot:
        listen-stream: $SNAP_COMMON/power-driver/moonshot.sock
