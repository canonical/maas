name: maas-power-driver-hmc
version: '1.0.0'
summary: MAAS power driver for IBM HMC
description: MAAS power driver for IBM HMC BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  hmc-driver:
    plugin: python
    source: .
