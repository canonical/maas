name: maas-power-driver-hmc
version: '1.0.0'
summary: MAAS power driver for IBM HMC
description: MAAS power driver for IBM HMC BMCs
grade: devel
confinement: strict
base: core26

plugs:
  power-driver:
    interface: content
    content: power-driver

parts:
  hmc-driver:
    plugin: python
    source: .
services:
  hmc-driver:
    command: bin/hmc-driver start
    plugs:
      - network
    sockets:
      hmc:
        listen-stream: $SNAP_COMMON/power-driver/hmc.sock
