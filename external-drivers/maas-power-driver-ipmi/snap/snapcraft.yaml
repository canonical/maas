name: maas-power-driver-ipmi
version: '1.0.0'
summary: MAAS power driver for IPMI
description: MAAS power driver for IPMI BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  ipmi-driver:
    plugin: python
    source: .
    stage-packages:
      - freeipmi-tools
