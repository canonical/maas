name: maas-power-driver-ipmi
version: '1.0.0'
summary: MAAS power driver for IPMI
description: MAAS power driver for IPMI BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver
  network-bind:

apps:
  ipmi:
    command: bin/ipmi-driver start
    sockets:
      ipmi:
        listen-stream: $SNAP_COMMON/power-driver/ipmi.sock
  status:
    command: bin/ipmi-driver status

parts:
  ipmi-driver:
    plugin: python
    source: .
    stage-packages:
      - freeipmi-tools
    build-attributes:
      - enable-usrmerge
    override-build: |
      /usr/bin/python3 -m pip install --prefix=$CRAFT_PART_INSTALL/usr --no-build-isolation --root-user-action=ignore .
      find $CRAFT_PART_INSTALL -type f -executable -exec sed -i '1 s|^#!.*python3.*$|#!/usr/bin/env python3|' {} +
