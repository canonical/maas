name: maas-power-driver-recs
version: '1.0.0'
summary: MAAS power driver for RECS
description: MAAS power driver for RECS BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  recs-driver:
    plugin: python
    source: .

  tree:
    plugin: dump
    source: snap/local/tree
