name: maas-power-driver-redfish
version: "1.0.0"
summary: MAAS power driver for Redfish
description: MAAS power driver for Redfish BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

apps:
  redfish-driver:
    command: bin/redfish-driver start
    daemon: simple
    plugs:
      - network-bind
      - power-drivers
    sockets:
      redfish:
        listen-stream: $SNAP_COMMON/power-drivers/redfish.sock

plugs:
  power-drivers:
    interface: content
    content: power-drivers
    target: $SNAP_COMMON/power-drivers

parts:
  redfish-driver:
    plugin: python
    source: .
    build-packages:
      - python3
      - python3.14-venv
    stage-packages:
      - python3.14-venv
