name: maas-power-driver-ucsm
version: '1.0.0'
summary: MAAS power driver for Cisco UCSM
description: MAAS power driver for Cisco UCSM BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver

parts:
  ucsm-driver:
    plugin: python
    source: .

  tree:
    plugin: dump
    source: snap/local/tree
