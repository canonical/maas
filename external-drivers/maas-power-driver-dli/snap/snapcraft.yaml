name: maas-power-driver-dli
version: '1.0.0'
summary: MAAS power driver for DLI
description: MAAS power driver for DLI BMCs
grade: devel
confinement: strict
base: core26
build-base: devel

plugs:
  power-driver:
    interface: content
    content: power-driver
    target: $SNAP_COMMON/power-driver
  network-bind:

apps:
  dli:
    command: bin/dli-driver start
    sockets:
      dli:
        listen-stream: $SNAP_COMMON/power-driver/dli.sock
  status:
    command: bin/dli-driver status

parts:
  dli-driver:
    plugin: python
    source: .
    stage-packages:
      - wget
    build-attributes:
      - enable-usrmerge
    override-build: |
      /usr/bin/python3 -m pip install --prefix=$CRAFT_PART_INSTALL/usr --no-build-isolation --root-user-action=ignore .
      find $CRAFT_PART_INSTALL -type f -executable -exec sed -i '1 s|^#!.*python3.*$|#!/usr/bin/env python3|' {} +
